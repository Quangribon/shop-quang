<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Mini</title>

<body>
  <!-- ===== POPUP NHẬP MÃ FLYCAM ===== -->
<div id="flycamPopup" class="popup">
  <div class="popup-box">
    <h2>🚁 Giả lập Flycam</h2>

    <p>Nhập mã truy cập</p>

    <input
      type="password"
      id="flycamCode"
      placeholder="Nhập mã..."
    >

    <p id="flycamError" class="error"></p>

    <div class="popup-btns">
      <button class="btn-blue" onclick="checkFlycam()">Truy cập</button>
      <button class="btn-gray" onclick="closeFlycam()">Đóng</button>
    </div>
  </div>
</div>

  
<!-- HEADER -->
<div class="header">
  <div class="logo">🎧 Shop QuangRibon</div>
  <div class="search">
    <input id="search" placeholder="Tìm sản phẩm...">
  </div>
</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
  <h3 onclick="toggleMenu()">Danh mục ⬇</h3>

  <ul id="menuList">
    <li onclick="filter('all')">Tất cả</li>
    <li onclick="filter('ear')">Tai nghe</li>
    <li onclick="filter('speaker')">Loa</li>
    <li onclick="filter('acc')">Phụ kiện</li>
    <li onclick="filter('mh')">Phụ Kiện Decor</li>
    <li onclick="flycam()">Giả lập flycam</li>
    <li onclick="showVongQuay()">Vòng Quay</li>
  </ul>
</div>


  <!-- CONTENT -->
  <div class="content">

    <!-- SLIDER -->
    <div class="slider" id="slider"></div>

    <!-- PRODUCTS -->
    <div class="products" id="products"></div>

  </div>
</div>

<div id="spinPopup" class="spin-popup">
  <div class="spin-box">
    <h2>🎁 Vòng quay may mắn</h2>

    <div class="wheel-container">
      <canvas id="wheelCanvas" width="300" height="300"></canvas>
      <div class="pointer">▼</div>
    </div>

  <div class="spin-actions">
    <button id="spinBtn" class="spin-btn">Quay ngay</button>
    <button class="close-btn" onclick="closeSpin()">Đóng</button>
  </div>
    <p id="result"></p>
  </div>
</div>
