<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Shop Mini</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🎧 Shop QuangRibon</div>
  <div class="search">
    <input id="search" placeholder="Tìm sản phẩm...">
  </div>
</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
  <h3 onclick="toggleMenu()">Danh mục ⬇</h3>

  <ul id="menuList">
    <li onclick="filter('all')">Tất cả</li>
    <li onclick="filter('ear')">Tai nghe</li>
    <li onclick="filter('speaker')">Loa</li>
    <li onclick="filter('acc')">Phụ kiện</li>
  </ul>
</div>
<div id="modal" style="
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
">
  <div id="modalContent" style="
    background:#fff;
    padding:20px;
    border-radius:10px;
    width:300px;
  "></div>
</div>

  <!-- CONTENT -->
  <div class="content">

    <!-- SLIDER -->
    <div class="slider" id="slider"></div>

    <!-- PRODUCTS -->
    <div class="products" id="products"></div>

  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>
